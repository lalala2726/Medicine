spring:
  config:
    # 导入根目录 .env，统一管理敏感配置和环境差异。
    # 示例: optional:file:.env[.properties],optional:file:../.env[.properties]
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  profiles:
    # 启用的 Spring Profile（数据源、支付、Dubbo 模式由 .env 统一控制）。
    # 示例: druid,payment,${MEDICINE_DUBBO_PROFILE:dubbo-local}
    active: druid,payment,${MEDICINE_DUBBO_PROFILE:dubbo-local}
  application:
    # 应用名称（用于日志和注册识别）。
    # 示例: Medical
    name: Medicine-Admin
    # 应用版本号。
    # 示例: 0.1
    version: 0.1
  servlet:
    multipart:
      # 单个上传文件最大大小。
      # 示例: 50MB
      max-file-size: 50MB
      # 单次请求上传总大小上限。
      # 示例: 50MB
      max-request-size: 50MB
  data:
    mongodb:
      # MongoDB 连接串。
      # 示例: mongodb://user:pass@127.0.0.1:27017/medicine?authSource=admin
      uri: ${MEDICINE_MONGODB_URI:mongodb://127.0.0.1:27017/medicine}
      # 是否自动创建 MongoDB 索引。
      # 示例: true
      auto-index-creation: true
      # UUID 表示方式。
      # 示例: standard
      uuid-representation: standard
    redis:
      # Redis 主机地址。
      # 示例: 127.0.0.1
      host: ${MEDICINE_REDIS_HOST:127.0.0.1}
      # Redis 端口。
      # 示例: 6379
      port: ${MEDICINE_REDIS_PORT:6379}
      # Redis DB 索引。
      # 示例: 0
      database: ${MEDICINE_REDIS_DB:0}
      # Redis 密码。
      # 示例: your_redis_password
      password: ${MEDICINE_REDIS_PASSWORD:}
  elasticsearch:
    # Elasticsearch 用户名。
    # 示例: elastic
    username: ${MEDICINE_ES_USERNAME:elastic}
    # Elasticsearch 密码。
    # 示例: your_es_password
    password: ${MEDICINE_ES_PASSWORD:}
    # Elasticsearch 节点地址列表。
    # 示例: http://127.0.0.1:9200
    uris: ${MEDICINE_ES_URIS:http://127.0.0.1:9200}
  rabbitmq:
    # RabbitMQ 主机地址。
    # 示例: 127.0.0.1
    host: ${MEDICINE_RABBIT_HOST:127.0.0.1}
    # RabbitMQ 端口。
    # 示例: 5672
    port: ${MEDICINE_RABBIT_PORT:5672}
    # RabbitMQ 用户名。
    # 示例: guest
    username: ${MEDICINE_RABBIT_USERNAME:guest}
    # RabbitMQ 密码。
    # 示例: guest
    password: ${MEDICINE_RABBIT_PASSWORD:guest}
    # RabbitMQ 虚拟主机。
    # 示例: /
    virtual-host: ${MEDICINE_RABBIT_VHOST:/}
    listener:
      simple:
        # 消息确认模式。
        # 示例: auto
        acknowledge-mode: auto
        # 每次拉取消息数量。
        # 示例: 10
        prefetch: 10
        # 最小并发消费者数量。
        # 示例: 2
        concurrency: 2
        # 最大并发消费者数量。
        # 示例: 10
        max-concurrency: 10
    # 生产者确认类型。
    # 示例: correlated
    publisher-confirm-type: correlated
    # 开启消息回退。
    # 示例: true
    publisher-returns: true
    template:
      # 无法路由时强制回退。
      # 示例: true
      mandatory: true

server:
  # Admin HTTP 服务端口。
  # 示例: 8080
  port: 8080

mybatis-plus:
  configuration:
    # SQL 日志实现类。
    # 示例: org.apache.ibatis.logging.stdout.StdOutImpl
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 实体别名包路径。
  # 示例: cn.zhangchuangla.medicine.**.entity
  type-aliases-package: cn.zhangchuangla.medicine.**.entity
  mapper-locations:
    # Mapper XML 扫描路径。
    # 示例: classpath*:mapper/**/**.xml
    - classpath*:mapper/**/**.xml
  global-config:
    db-config:
      # 逻辑删除字段。
      # 示例: isDeleted
      logic-delete-field: isDeleted
      # 逻辑删除值。
      # 示例: 1
      logic-delete-value: 1
      # 逻辑未删除值。
      # 示例: 0
      logic-not-delete-value: 0

security:
  # 鉴权请求头名称。
  # 示例: Authorization
  header: Authorization
  # JWT 签名密钥。
  # 示例: local-dev-secret-local-dev-secret-1234
  secret: ${SECURITY_SECRET:local-dev-secret-local-dev-secret-1234}
  # Access Token 过期时间（毫秒）。
  # 示例: 18000000
  access-token-expire-time: 18000000
  # Refresh Token 过期时间（毫秒）。
  # 示例: 25920000
  refresh-token-expire-time: 25920000

minio:
  # MinIO 服务地址。
  # 示例: http://127.0.0.1:9000
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  # MinIO Access Key。
  # 示例: minioadmin
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  # MinIO Secret Key。
  # 示例: minioadmin
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  # 默认文件桶。
  # 示例: medicine
  bucket-name: ${MINIO_BUCKET_NAME:medicine}

file:
  upload:
    # 允许上传的 MIME 类型。
    # 示例: image/jpeg,image/png,application/pdf
    allowed-types: image/jpeg,image/png,image/gif,image/webp,application/pdf

ip2region:
  # 是否启用 IP 地理位置解析。
  # 示例: true
  enabled: true
  # IP 库文件路径。
  # 示例: classpath:data/ip2region.xdb
  db-path: classpath:data/ip2region.xdb
  # 是否启用本地缓存。
  # 示例: true
  cache-enabled: true
