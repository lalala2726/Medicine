spring:
  profiles:
    active: druid,payment
  application:
    name: Medical
    version: 0.1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    mongodb:
      uri: mongodb://zhangchuang:zhangchuang2726@192.168.10.110:27017/medicine?authSource=admin&authMechanism=SCRAM-SHA-256
      # 自动创建索引
      auto-index-creation: true
      # UUID表示方式
      uuid-representation: standard
    redis:
      host: 192.168.10.110
      port: 6379
      database: 0
      password: zhangchuang2726
  #elasticsearch 配置
  elasticsearch:
    username: elastic
    password: zhangchuang2726
    uris: http://192.168.10.110:9200
  rabbitmq:
    host: 192.168.10.110
    port: 5672
    username: zhangchuang
    password: zhangchuang2726
    virtual-host: /
    listener:
      simple:
        # 自动确认；如需手动确认可改为 manual
        acknowledge-mode: auto
        prefetch: 10
        concurrency: 2
        max-concurrency: 10
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
server:
  port: 8080
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: cn.zhangchuangla.medicine.**.entity
  mapper-locations:
    - classpath*:mapper/**/**.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted  # 全局逻辑删除字段名
      logic-delete-value: 1         # 逻辑已删除值
      logic-not-delete-value: 0     # 逻辑未删除值

# 安全配置
security:
