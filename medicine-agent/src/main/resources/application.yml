spring:
  config:
    # 导入根目录 .env，统一管理敏感配置和环境差异。
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  profiles:
    # 启用的 Spring Profile（Dubbo 模式由 .env 统一控制，默认本地直连）。
    # 示例: ${MEDICINE_DUBBO_PROFILE:dubbo-local}
    active: ${MEDICINE_DUBBO_PROFILE:dubbo-local}
  application:
    # 应用名称（用于日志和注册识别）。
    # 示例: MedicineAiAgent
    name: Medicine-Agent
    # 应用版本号。
    # 示例: 0.1
    version: 0.1
  servlet:
    multipart:
      # 单个上传文件最大大小。
      # 示例: 50MB
      max-file-size: 50MB
      # 单次请求上传总大小上限。
      # 示例: 50MB
      max-request-size: 50MB
  data:
    redis:
      # Redis 主机地址。
      # 示例: 127.0.0.1
      host: ${MEDICINE_REDIS_HOST:127.0.0.1}
      # Redis 端口。
      # 示例: 6379
      port: ${MEDICINE_REDIS_PORT:6379}
      # Redis DB 索引。
      # 示例: 0
      database: ${MEDICINE_REDIS_DB:0}
      # Redis 密码。
      # 示例: your_redis_password
      password: ${MEDICINE_REDIS_PASSWORD:}

server:
  # Agent HTTP 服务端口。
  # 示例: 8083
  port: 8083

security:
  # 鉴权请求头名称。
  # 示例: Authorization
  header: Authorization
  # JWT 签名密钥。
  # 示例: local-dev-secret-local-dev-secret-1234
  secret: ${SECURITY_SECRET:local-dev-secret-local-dev-secret-1234}
  # Access Token 过期时间（毫秒）。
  # 示例: 18000000
  access-token-expire-time: 18000000
  # Refresh Token 过期时间（毫秒）。
  # 示例: 25920000
  refresh-token-expire-time: 25920000

system-auth:
  # 系统鉴权总开关。
  # 示例: true
  enabled: ${SYSTEM_AUTH_ENABLED:true}
  # 时间戳容差（秒）。
  # 示例: 300
  max-skew-seconds: ${SYSTEM_AUTH_MAX_SKEW_SECONDS:300}
  # nonce 存活时间（秒）。
  # 示例: 600
  nonce-ttl-seconds: ${SYSTEM_AUTH_NONCE_TTL_SECONDS:600}
  # nonce Redis key 前缀。
  # 示例: system_auth:nonce
  nonce-key-prefix: ${SYSTEM_AUTH_NONCE_KEY_PREFIX:system_auth:nonce}
  # 客户端注册信息 JSON（app_id/secret/enabled）。
  # 示例: [{"app_id":"medicine-admin","secret":"xxx","enabled":true}]
  clients-json: ${SYSTEM_AUTH_CLIENTS_JSON:[]}
  # 默认签名版本。
  # 示例: v1
  default-sign-version: ${SYSTEM_AUTH_DEFAULT_SIGN_VERSION:v1}
  # 本方 app_id（出站签名使用）。
  # 示例: medicine-agent
  x-agent-key: ${MEDICINE_AGENT_X_AGENT_KEY:medicine-agent}
  # 本方签名 secret（出站签名使用）。
  # 示例: your-local-secret
  local-secret: ${MEDICINE_AGENT_SYSTEM_AUTH_LOCAL_SECRET:}

minio:
  # MinIO 服务地址。
  # 示例: http://127.0.0.1:9000
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  # MinIO Access Key。
  # 示例: minioadmin
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  # MinIO Secret Key。
  # 示例: minioadmin
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  # 默认文件桶。
  # 示例: medicine
  bucket-name: ${MINIO_BUCKET_NAME:medicine}
  # 文件上传路径前缀，防止对象直接落在桶根目录。
  # 示例: resources
  upload-path: ${MINIO_UPLOAD_PATH:resources}
  # 文件公网访问前缀，配置后上传接口返回该前缀下的 CDN 地址。
  # 示例: https://medicine-cdn.zhangchuangla.cn/
  public-url-prefix: ${MINIO_PUBLIC_URL_PREFIX:}

file:
  upload:
    # 允许上传的 MIME 类型或文件扩展名。
    # 示例: [image/jpeg, image/png, application/pdf, .docx]
    allowed-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - application/pdf
      - text/plain
      - .txt
      - .md
      - .pdf
      - .docx
      - .doc
      - .pptx
      - .ppt
      - .xlsx
      - .xls
