spring:
  application:
    name: MedicineClient-Test
  profiles:
    active: test

  # 测试数据库配置
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Redis测试配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 1  # 使用不同的数据库避免冲突
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  type-aliases-package: cn.zhangchuangla.medicine.**.entity
  mapper-locations:
    - classpath*:mapper/**/**.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 安全配置
security:
  header: Authorization
  secret: test-secret-key-for-testing-only-32bytes
  access-token-expire-time: 60000  # 1分钟，便于测试
  refresh-token-expire-time: 120000  # 2分钟，便于测试

# IP2Region配置
ip2region:
  enabled: false  # 测试中禁用IP功能
  db-path: classpath:data/ip2region.xdb
  cache-enabled: false

# 日志配置
logging:
  level:
    cn.zhangchuangla.medicine: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.testcontainers: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"