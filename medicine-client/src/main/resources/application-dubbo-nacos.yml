dubbo:
  application:
    # Dubbo 应用名。
    # 示例: medicine-client-dubbo
    name: medicine-client-dubbo
    # 序列化安全检查级别（STRICT/WARN/DISABLE）。
    # 示例: WARN
    serialize-check-status: WARN
  scan:
    # Dubbo 服务扫描包。
    # 示例: cn.zhangchuangla.medicine
    base-packages: cn.zhangchuangla.medicine
  protocol:
    # Dubbo 协议。
    # 示例: tri
    name: tri
    # Client Dubbo 暴露端口。
    # 示例: 20881
    port: ${MEDICINE_CLIENT_DUBBO_PORT:20881}
  registry:
    # Nacos 注册中心地址。
    # 示例: nacos://127.0.0.1:8848
    address: nacos://${DUBBO_NACOS_HOST:127.0.0.1}:${DUBBO_NACOS_PORT:8848}
    parameters:
      # Nacos 命名空间。
      # 示例: public
      namespace: ${DUBBO_NACOS_NAMESPACE:public}
      # Nacos 分组。
      # 示例: DEFAULT_GROUP
      group: ${DUBBO_NACOS_GROUP:DEFAULT_GROUP}
      # Nacos 用户名。
      # 示例: nacos
      username: ${DUBBO_NACOS_USERNAME:nacos}
      # Nacos 密码。
      # 示例: nacos
      password: ${DUBBO_NACOS_PASSWORD:nacos}
  provider:
    # Provider 超时（毫秒）。
    # 示例: 3000
    timeout: 3000
    # Provider 重试次数。
    # 示例: 0
    retries: 0
